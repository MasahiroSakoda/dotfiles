# -*-mode:toml-*- vim:ft=toml

[ghostty]
opacity = 0.8

[ghostty.background]
opacity = 0.4
image   = "daft-punk-music-retro-style-wallpaper.jpg"

[ghostty.theme]
light = "Builtin Solarized Light"
dark  = "GitHub Dark"

[ghostty.cursor]
color = "#ccff00"
text  = "#030303"

[ghostty.search.normal]
foreground = "#2e3440"
background = "#ebcbbb"

[ghostty.search.selected]
foreground = "#2e3440"
background = "#bf616a"

[ghostty.modes.vim]
enabled = true

[ghostty.modes.resize]
enabled = true

[ghostty.shader]
enabled = false
animate = true
module  = "" # Usage: cubes|galaxy|just-snow|sparks-from-fire
