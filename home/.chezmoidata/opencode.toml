# -*-mode:toml-*- vim:ft=toml

[opencode]
autoupdate = false
autoshare  = false
snapshot   = false
theme      = "github"

plugins = [
  "oh-my-opencode@latest",
  "./plugin/damage-control.ts",
  "./plugin/notification.ts",
  "./plugin/limits.ts",
]
instructions = [ "AGENTS.md", "CLAUDE.md" ]

enabled_providers = [ "opencode", "openrouter", "github-copilot", "ollama" ]

[opencode.models]
ultra   = [
  # "opencode/trinity-large-preview-free",
  "opencode/qwen3.6-plus-free",
  "opencode/mimo-v2-pro-free",
  "opencode/big-pickle",
  "opencode/minimax-m2.5-free",
]
elite   = [
  "opencode/qwen3.6-plus-free",
  "opencode/mimo-v2-pro-free",
  "opencode/big-pickle",
  "opencode/minimax-m2.5-free",
  "opencode/nemotron-3-super-free",
]
general = [
  "opencode/big-pickle",
  "opencode/minimax-m2.5-free",
  "openrouter/nvidia/nemotron-3-super-120b-a12b:free",
]
lite    = [
  "opencode/minimax-m2.5-free",
  "opencode/nemotron-3-super-free",
  "openrouter/nvidia/nemotron-3-super-120b-a12b:free",
]
micro   = [
  "openrouter/z-ai/glm-4.5-air:free",
  "openrouter/nvidia/nemotron-3-super-120b-a12b:free",
  "opencode/nemotron-3-super-free",
]

[opencode.tui]
scroll_speed = 2
scroll_acceleration = { enabled = true }

[opencode.keybinds]
leader              = "Ctrl+x"
session_child_cycle = "Ctrl+Tab"

[opencode.compaction]
auto  = true
prune = true

[opencode.watcher]
ignore = [
  ".git/**",
  ".cache/**",
  ".next/**",
  "**/*.log",
  "node_modules/**",
  "build/**",
  "dist/**",
  "vendor/**",
  "target/**",
  "package-lock.json",
  "deno.lock",
  "bun.lock",
  "pnpm-lock.yaml",
  "*.env",
  "*.env.*",
  "*.db",
  "*.sqlite",
]

[opencode.permissions]
list      = "allow"
grep      = "allow"
glob      = "allow"
task      = "allow"
skill     = "allow"
lsp       = "allow"
todoread  = "allow"
todowrite = "allow"
question  = "allow"
webfetch  = "allow"

doom_loop          = "ask"
external_directory = "deny"

[opencode.permissions.read]
# Block access to the secrets
"*"             = "allow"
"*.env"         = "deny"
"*.env.*"       = "deny"
"*.env.example" = "allow"

"*.pem"   = "deny"
"*.key"   = "deny"
"*.p12"   = "deny"
"*.pfx"   = "deny"
"*.jks"   = "deny"

".git/config"   = "deny"
"*credentials*" = "deny"
"*secret*"      = "deny"
"*.keystore"    = "deny"
"**/secrets/**" = "deny"
"**/private/**" = "deny"
"**/.aws/**"    = "deny"
"**/.ssh/**"    = "deny"
"**/.gnupg/**"  = "deny"

"*/docker-compose.yml"  = "ask"
"*/compose.yaml"        = "ask"


[opencode.permissions.edit]
"*"       = "ask"
"*.env"   = "deny"
"*.env.*" = "deny"
"*.pem"   = "deny"
"*.key"   = "deny"

"*credentials*" = "deny"
"*secret*"      = "deny"

[opencode.permissions.bash]
"*"       = "deny"

# Privilege escalation
"su*"  = "deny"
"sudo*" = "deny"

# Code execution
"eval*"   = "deny"
"exec*"   = "deny"
"source*" = "deny"
"sh -c"   = "deny"
"bash -c" = "deny"
"zsh -c"  = "deny"
"xargs*"  = "ask"

"curl*|*sh*"   = "deny"
"curl*|*bash*" = "deny"
"wget*|*sh*"   = "deny"
"wget*|*bash*" = "deny"

# Clipboard
"pbcopy*"  = "ask"
"pbpaste*" = "ask"

# Alias
"alias*"   = "deny"
"unalias*" = "deny"

# Sounds
"afplay*" = "allow"

# Filtering
"awk*"    = "ask"
"sed*"    = "deny"
"export*" = "deny"
"uniq*"   = "allow"

# Permission changes
"chmod*" = "deny"
"chown*" = "deny"

# Filesystem destruction
# ":(){:|:&};:" = "deny" # fork bomb, just in case
"rm -rf*"     = "deny"
"rm -r*"      = "deny"
"rm*"         = "ask"
"rmdir*"      = "ask"

# Potentially destructive
"mv*"     = "ask"
"cp*"     = "ask"
"dd*"     = "deny"
"fdisk*"  = "deny"
"format*" = "deny"
"diskutil apfs delete*" = "deny"
"diskutil erase*"       = "deny"
"diskutil partition*"   = "deny"

# Process
"ps*"      = "allow"
"kill*"    = "ask"
"pkill*"   = "ask"
"killall*" = "ask"
"top"      = "allow"

# Pager / Editor
"vi*"    = "deny"
"vim*"   = "deny"
"emacs*" = "deny"
"nano*"  = "deny"
"man*"   = "deny"
"head*"  = "allow"
"tail*"  = "allow"
"less*"  = "allow"
"more*"  = "allow"

# File inspection
"find * -delete*" = "deny"
"find * -exec*"   = "deny"

# Network
"ssh*"    = "ask"
"scp*"    = "ask"
"rsync*"  = "ask"
"nc*"     = "deny"
"netcat*" = "deny"

# mise
"mise --help"    = "allow"
"mise doctor"    = "allow"
"mise current*"  = "allow"
"mise ls*"       = "allow"
"mise list*"     = "allow"
"mise use*"      = "allow"
"mise registry*" = "allow"
"mise which*"    = "allow"

# Git
"git *"   = "deny"
"git status*" = "allow"
"git show*"   = "allow"
"git diff*"   = "allow"
"git log*"    = "allow"
"git add*"    = "allow"
"git blame*"  = "allow"
"git reset*"  = "ask"
"git commit*" = "ask"
"git rebase*" = "ask"
"git pull*"   = "ask"
"git push*"   = "ask"

# GitHub CLI
"gh *"              = "deny"
"gh auth status*"   = "allow"
"gh search*"        = "allow"
"gh status*"        = "allow"
"gh branch*"        = "allow"
"gh issue view*"    = "allow"
"gh issue list*"    = "allow"
"gh issue status*"  = "allow"
"gh pr view*"       = "allow"
"gh pr list*"       = "allow"
"gh pr status*"     = "allow"
"gh pr diff*"       = "allow"
"gh repo view*"     = "allow"
"gh repo list*"     = "allow"
"gh workflow view*" = "allow"
"gh workflow list*" = "allow"
"gh release view*"  = "allow"
"gh release list*"  = "allow"
"gh run view*"      = "allow"
"gh run list*"      = "allow"

## GitHub API via CLI
"gh api --help"             = "allow"
"gh api * -X POST*"         = "ask"
"gh api * -X PUT*"          = "ask"
"gh api * -X PATCH*"        = "ask"
"gh api * -X DELETE*"       = "ask"
"gh api * --method POST*"   = "ask"
"gh api * --method PUT*"    = "ask"
"gh api * --method PATCH*"  = "ask"
"gh api * --method DELETE*" = "ask"

[opencode.antigravity]
auto_update        = true
quiet_mode         = false
debug              = false
keep_thinking      = false
quota_fallback     = true
auto_resume        = true
pid_offset_enabled = true
account_selection_strategy = "hybrid" # "sticky"|"round-robin"|"hybrid"

# Provider

## Opencode Zen
[opencode.providers.opencode]
options   = { baseUrl = "https://opencode.ai/zen/v1", apiKey = "{env:OPENCODE_API_KEY}" }
whitelist = [
  "trinity-large-preview-free",
  "mimo-v2-pro-free",
  "kimi-k2.5-free",
  "glm-5-free",
  "glm-4.7-free",
  "big-pickle",
  "minimax-m2.5-free",
  "nemotron-3-super-free"
]

## OpenRouter
[opencode.providers.openrouter]
name      = "OpenRouter"
npm       = "@ai-sdk/openai-compatible"
options   = { baseUrl = "https://openrouter.ai/api/v1", apiKey = "{env:OPENROUTER_API_KEY}" }
whitelist = [
  "minimax/minimax-m2.5:free",
  "z-ai/glm-4.5-air:free",
  "nvidia/nemotron-3-super-120b-a12b:free",
  "arcee-ai/trinity-large-preview:free"
]

[opencode.providers.openrouter.models."minimax/minimax-m2.5:free"]
name = "MiniMax M2.5"

[opencode.providers.openrouter.models."z-ai/glm-4.5-air:free"]
name = "GLM 4.5 Air"

[opencode.providers.openrouter.models."nvidia/nemotron-3-super-120b-a12b:free"]
name = "NVIDIA: Nemotron 3 Super"

[opencode.providers.openrouter.models."arcee-ai/trinity-large-preview:free"]
name = "Arcee AI: Trinity Large Preview"

## Ollama
[opencode.providers.ollama]
name    = "Ollama"
npm     = "@ai-sdk/openai-compatible"
whitelist = ["glm-5:cloud", "minimax-m2.7:cloud", "kimi-k2.5:cloud", "qwen3.5:cloud"]
options = { baseURL = "https://ollama.com/v1" }

[opencode.providers.ollama.models."qwen3.5:cloud"]
name = "Qwen3.5 (cloud)"

[opencode.providers.ollama.models."kimi-k2.5:cloud"]
name = "Kimi K2.5 (cloud)"

[opencode.providers.ollama.models."glm-5:cloud"]
name = "GLM 5 (cloud)"

[opencode.providers.ollama.models."minimax-m2.7:cloud"]
name = "Minimax-m2.7 (cloud)"


## GitHub Copilot
[opencode.providers.github-copilot]
whitelist = [ "claude-haiku-4.5", "claude-sonnet-4.6", "claude-opus-4.6", "gpt-4.1", "gpt-5-mini" ]
