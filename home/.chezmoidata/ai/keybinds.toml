[ai.keybinds.app]
leader = ["ctrl+'"]
escape = ["esc", "ctrl+c"]
exit   = ["<leader>q"]
themes = ["<leader>t"]
tips   = ["<leader>h"]

[ai.keybinds.history]
prev = ["up"]
next = ["down"]

[ai.keybinds.session]
list     = ["alt+s"]
new      = ["alt+n"]
rename   = ["alt+r"]
timeline = ["ctrl+alt+s"]

[ai.keybinds.command]
list = ["alt+c"]

[ai.keybinds.agent]
list = ["alt+a"]
prev = ["shift+tab"]
next = ["tab"]

[ai.keybinds.model]
list        = ["alt+m"]
prev_recent = ["alt+."]
next_recent = ["alt+,"]
prev_fav    = ["alt+<"]
next_fav    = ["alt+>"]

[ai.keybinds.variant]
cycle_forward  = ["alt+tab"]
cycle_backward = ["alt+shift+tab"]

[ai.keybinds.mcp]
list = ["alt+shift+m"]

[ai.keybinds.skill]
list= ["alt+shift+s"]

[ai.keybinds.edit]
cursor_left  = ["left"]
cursor_right = ["right"]
cursor_up    = ["up"]
cursor_down  = ["down"]
clear        = ["ctrl+c"]
newline      = ["shift+enter", "alt+enter"]
submit       = ["enter"]
yank         = ["ctrl+y"]
paste        = ["ctrl+v"]
undo         = ["ctrl+z"]
redo         = ["ctrl+shift+z"]
select_left  = ["shift+left"]
select_right = ["shift+right"]
select_up    = ["shift+up"]
select_down  = ["shift+down"]
confirm_no   = ["n"]
confirm_yes  = ["y"]
open_editor  = ["ctrl+o"]

[ai.keybinds.navigate]
top            = ["ctrl+home"]
bottom         = ["ctrl+end"]
page_up        = ["ctrl+b"]
page_down      = ["ctrl+f"]
page_half_up   = ["ctrl+u"]
page_half_down = ["ctrl+d"]
