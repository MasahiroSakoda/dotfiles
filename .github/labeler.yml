# -*-mode:yaml-*- vim:ft=yaml
"CI/CD 🔁":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/*.yml"
          - ".github/ISSUE_TEMPLATE/*.yml"
          - ".github/pull_request_template.md"
          - ".github/CODEOWDERS"
          - ".github/labeler.yml"
"Deps 📦️":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/renovate.json"
          - ".github/renovate.json5"
          - ".github/dependabot.yml"
"Docs 📚":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "README.md"
          - 'CONTRIBUTING.md'
          - "SECURITY.md"
"Security 🛡️":
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - "home/private_dot_ssh/*"
          - "home/private_dot_gnupg/*"
          - "*.age"

"Bug 🐛":
  - head-branch:
      - "^fix/.*"
      - "^bugfix/.*"
      - "^hotfix/.*"
"Feature ✨":
  - head-branch:
      - "^feat/.*"
      - "^feature/.*"
"Chore 🏠":
  - head-branch:
      - "^chore/.*"
      - "^maintenance/.*"
"Refactor ♻️":
  - head-branch:
      - "^refactor/.*"
      - "^cleanup/.*"

"chezmoi 🏘️":
  - changed-files:
      - any-glob-to-any-file:
          - ".chezmoiroot"
          - "home/.chezmoi.toml.tmpl"
          - "home/.chezmoidata.toml"
          - "home/.chezmoiversion"
          - "home/.chezmoiignore"
          - "home/.chezmoiremove"
          - "home/.chezmoiscripts/*.sh.tmpl"
          - "home/.chezmoitemplates/**/*"
          - "home/.chezmoiexternals/*"
"Homebrew 🍺":
  - changed-files:
      - any-glob-to-any-file:
          - "home/.chezmoiscripts/run_once_after_00-homebrew.sh.tmpl"
          - "home/.chezmoitemplates/common/script_eval_brew"
          - "home/.chezmoidata/packages.toml"
          - "home/dot_config/homebrew/*.tmpl"
"CLI 💻":
  - changed-files:
      - any-glob-to-any-file:
          - "home/dot_config//*"
"Shell 🐚":
  - changed-files:
      - any-glob-to-any-file:
          - "home/dot_config/fish/*.fish.tmpl"
          - "home/dot_config/fish/**/*"
          - "home/dot_config/fish/fish_plugins"
          - "home/dot_config/zsh/*"
          - "home/dot_config/zsh/functions/*"
          - "home/.chezmoiscripts/run_once_after_10-fish.sh.tmpl"
"mise ⚙️":
  - changed-files:
      - any-glob-to-any-file:
          - "home/.chezmoiscripts/run_once_after_2*.sh.tmpl"
          - "home/dot_config/mise/*.toml.tmpl"
"NeoVim 📝":
  - changed-files:
      - any-glob-to-any-file:
          - "home/dot_config/nvim/lua/**/*.lua"
          - "home/dot_config/nvim/lua/**/*.lua.tmpl"
          - "home/dot_config/nvim/after/**/*.lua"
"IDE 💡":
  - changed-files:
      - any-glob-to-any-file:
          - "home/.chezmoiscripts/run_onchange_after_04-vscode.sh.tmpl"
          - "home/.chezmoitemplates/common/vscode/*"
          - "home/Library/Applications Support/Code/User/*"
          - "home/dot_config/Code/User/*"
          - "home/dot_editorconfig.tmpl"
"Terminal 🖥️":
  - changed-files:
      - any-glob-to-any-file:
          - "home/.chezmoitemplates/common/ghostty/*"
          - "home/.chezmoiexternals/tmux.toml.tmpl"
          - "home/.chezmoiexternals/zellij.toml.tmpl"
          - "home/Library/Applications Support/com.mitchellh.ghostty/*"
          - "home/dot_config/wezterm/*"
          - "home/dot_config/ghostty/*"
          - "home/dot_config/zellij/*"
"AI 🤖":
  - changed-files:
      - any-glob-to-any-file:
          - ".agents/*"
          - "home/.chezmoitemplates/common/ai/*"
          - "home/.chezmoiexternals/opencode.toml.tmpl"
          - "home/dot_config/nvim/lua/ai/*"
          - "home/dot_config/opencode/agent/**/*.md"
          - "home/dot_config/opencode/command/**/*.md"
          - "home/dot_config/opencode/*.json.tmpl"
          - "home/dot_gemini/*"
          - "home/dot_agents/*"
